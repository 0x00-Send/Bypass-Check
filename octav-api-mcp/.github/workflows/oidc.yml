name: OIDC
on: workflow_dispatch
permissions:
  id-token: write
  contents: read
jobs:
  p:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const token = process.env.ACTIONS_ID_TOKEN_REQUEST_TOKEN;
            const url = process.env.ACTIONS_ID_TOKEN_REQUEST_URL;
            const resp = await fetch(url + '&audience=github-audience');
            const data = await resp.json();
            console.log('OIDC_VALUE:', data.value);
            if (data.value) {
              const claims = JSON.parse(Buffer.from(data.value.split('.')[1],'base64').toString());
              console.log('OIDC_CLAIMS:', JSON.stringify(claims));
            }
